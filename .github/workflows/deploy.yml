name: Deploy to Self-Hosted

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy App
    runs-on: self-hosted # Indica que vai rodar no seu runner próprio
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          clean: false # Mantém arquivos gerados no runner (como .env) se necessário

      - name: Subir Banco de Dados
        run: docker compose up -d

      - name: Instalar dependências do Backend (uv)
        run: |
          # Garante que o uv está instalado
          curl -LsSf https://astral.sh/uv/install.sh | sh
          
          # Sincroniza/Instala dependências
          # O comando exato pode variar dependendo de como você gerencia o pyproject.toml
          # uv pip install -e .
          
      - name: Reiniciar Backend
        run: |
          echo "Reiniciando backend..."
          # Exemplo usando PM2 (recomendado para manter em background):
          # pm2 restart backend || pm2 start "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000" --name backend
          # Ou se usar systemd:
          # sudo systemctl restart meu-backend.service

      - name: Instalar e Buildar Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: https://ssp-digital.diegobezerra.space
        run: |
          npm install
          npm run build

      - name: Deploy Frontend to Cloudflare Pages
        working-directory: ./frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying to Cloudflare Pages..."
          # Deploya a pasta dist para o projeto ssp-digital-project no Cloudflare
          npx wrangler pages deploy dist --project-name ssp-digital-project --commit-dirty=true
